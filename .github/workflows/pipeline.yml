name: .NET Core Build and Deploy to Elastic Beanstalk

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

# Definindo variáveis globais para facilitar mudanças futuras
env:
  AWS_APPLICATION_NAME: 'projeto-aspnet-aws'
  AWS_ENVIRONMENT_NAME: 'Projeto-aspnet-aws-env'
  AWS_REGION: 'us-east-2'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Checkout do código
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Configuração do SDK .NET 10
    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Restaura as dependências
    - name: Install dependencies
      run: dotnet restore ProjetoAWS/ProjetoAWS.csproj

    # 4. Compila e Publica os arquivos finais da aplicação na pasta 'out'
    - name: Publish Project
      run: dotnet publish ProjetoAWS/ProjetoAWS.csproj --configuration Release --no-restore --output ./out

    # 5. Empacota o conteúdo publicado em um arquivo ZIP (exigido pelo Beanstalk)
    - name: Generate Deployment Package
      run: |
        cd out
        zip -r ../deploy.zip .
        cd ..

    # 6. Configura as credenciais da AWS na máquina virtual do GitHub Actions
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    # 7. Faz o upload do ZIP e atualiza o ambiente do Elastic Beanstalk
    - name: Deploy to AWS Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: ${{ env.AWS_APPLICATION_NAME }}
        environment_name: ${{ env.AWS_ENVIRONMENT_NAME }}
        region: ${{ env.AWS_REGION }}
        version_label: "deploy-${{ github.sha }}" # Usa o hash do commit como versão única
        deployment_package: deploy.zip
