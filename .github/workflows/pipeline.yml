name: Build and Deploy .NET Project to AWS Elastic Beanstalk

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

env:
  AWS_APPLICATION_NAME: 'projeto-aspnet-aws'
  AWS_ENVIRONMENT_NAME: 'projeto-aspnet-aws-felipe'
  AWS_REGION: 'us-east-2'

jobs:
  # PRIMEIRO JOB: Apenas compila e guarda os arquivos
  build:
    name: Build ProjetoAWS
    runs-on: ubuntu-latest
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET Core SDK
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Install dependencies
      run: dotnet restore ProjetoAWS/ProjetoAWS.csproj

    - name: Publish Project
      run: dotnet publish ProjetoAWS/ProjetoAWS.csproj --configuration Release --no-restore --output ./out

    - name: Generate Deployment Package
      run: |
        cd out
        zip -r ../deploy.zip .
        cd ..

    # Salva o arquivo ZIP temporariamente para o próximo Job conseguir usar
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: deploy-package
        path: deploy.zip

  # SEGUNDO JOB: Só roda se o "build" terminar com sucesso (needs: build)
  deploy:
    name: Deploy to AWS Elastic Beanstalk
    runs-on: ubuntu-latest
    needs: build 
    steps:
    # Recupera o ZIP gerado no Job anterior
    - name: Download Artifact
      uses: actions/download-artifact@v4
      with:
        name: deploy-package

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Deploy to AWS Elastic Beanstalk
      uses: einaregilsson/beanstalk-deploy@v22
      with:
        aws_access_key: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws_secret_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        application_name: ${{ env.AWS_APPLICATION_NAME }}
        environment_name: ${{ env.AWS_ENVIRONMENT_NAME }}
        region: ${{ env.AWS_REGION }}
        version_label: "deploy-${{ github.sha }}"
        deployment_package: deploy.zip
